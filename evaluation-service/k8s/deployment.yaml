apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: togglemaster
  labels:
    app: evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: evaluation-service
          image: REGION.ocir.io/NAMESPACE/togglemaster/evaluation-service:latest
          ports:
            - containerPort: 8004
              protocol: TCP
          env:
            - name: PORT
              value: "8004"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: REDIS_URL
            - name: FLAG_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: FLAG_SERVICE_URL
            - name: TARGETING_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: TARGETING_SERVICE_URL
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: SERVICE_API_KEY
            - name: AWS_SQS_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: AWS_SQS_URL
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: AWS_REGION
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always
