name: "Donation Service - Build & Deploy"

on:
  push:
    branches: [ main ]
    paths:
      - "donation-service/**"
  pull_request:
    branches: [ main ]
    paths:
      - "donation-service/**"
  workflow_dispatch:

env:
  SERVICE_NAME: donation-service
  OCI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  lint-and-test:
    name: "Lint & Unit Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: donation-service/go.mod

      - name: Go Mod Tidy
        run: |
          cd donation-service
          go mod tidy

      - name: Go Lint
        run: |
          cd donation-service
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: Unit Test
        run: |
          cd donation-service
          go test -v ./...

  security-scan:
    name: "Security Scan (SAST & SCA)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gosec (SAST)
        uses: securego/gosec@master
        with:
          args: ./donation-service/...

      - name: Run Trivy (SCA - Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./donation-service"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: [ lint-and-test, security-scan ]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login ${{ env.OCI_REGION }}.ocir.io -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USERNAME }}" --password-stdin

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./donation-service
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/hackathon-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/hackathon-repo/${{ env.SERVICE_NAME }}:latest

  deploy:
    name: "Deploy to OKE"
    runs-on: ubuntu-latest
    needs: [ build-and-push ]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure OCI Credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ env.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF
          sed -i 's/^[[:space:]]*//' ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | bash -s -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Get Kubeconfig
        run: |
          $HOME/bin/oci ce cluster create-kubeconfig --cluster-id ${{ secrets.OCI_OKE_CLUSTER_ID }} --file $HOME/.kube/config --region ${{ env.OCI_REGION }} --token-version 2.0.0

      - name: Create OCIR Image Pull Secret
        run: |
          kubectl create secret docker-registry ocir-secret \
            --docker-server=${{ env.OCI_REGION }}.ocir.io \
            --docker-username="${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USERNAME }}" \
            --docker-password="${{ secrets.OCI_AUTH_TOKEN }}" \
            --docker-email=noreply@oci.com \
            -n togglemaster \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create New Relic Secret
        run: |
          NR_KEY="${{ secrets.NEW_RELIC_LICENSE_KEY }}"
          if [ -n "$NR_KEY" ]; then
            kubectl create secret generic newrelic-secret \
              --from-literal=license-key="$NR_KEY" \
              --from-literal=otlp-headers="api-key=$NR_KEY" \
              -n togglemaster \
              --dry-run=client -o yaml | kubectl apply -f -
          else
            echo "NEW_RELIC_LICENSE_KEY not set, skipping newrelic-secret creation"
          fi

      - name: Deploy Infrastructure (PostgreSQL + Redis)
        run: |
          kubectl apply -f k8s-infra/postgres.yaml
          kubectl apply -f k8s-infra/redis.yaml
          kubectl rollout status deployment/postgres -n togglemaster --timeout=120s || true
          kubectl rollout status deployment/redis -n togglemaster --timeout=120s || true

      - name: Run DB Init Jobs
        run: |
          kubectl delete job db-init-ngo -n togglemaster --ignore-not-found
          kubectl delete job db-init-donation -n togglemaster --ignore-not-found
          kubectl apply -f k8s-infra/db-init-job.yaml
          kubectl wait --for=condition=complete job/db-init-donation -n togglemaster --timeout=120s || true

      - name: Deploy to K8s
        run: |
          kubectl apply -f k8s-common/ingress.yaml
          kubectl apply -f donation-service/k8s/manifests.yaml
          kubectl set image deployment/donation-service donation-service=${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/hackathon-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} -n togglemaster
          kubectl rollout status deployment/donation-service -n togglemaster --timeout=300s || {
            echo "========================================"
            echo "DEPLOYMENT FAILED - COLLECTING EVIDENCE"
            echo "========================================"
            echo ""
            echo "=== PODS ==="
            kubectl get pods -n togglemaster -o wide
            echo ""
            echo "=== SECRETS ==="
            kubectl get secret -n togglemaster
            echo ""
            echo "=== POD DETAILS ==="
            kubectl describe pods -l app=donation-service -n togglemaster
            echo ""
            echo "=== POD LOGS ==="
            for pod in $(kubectl get pods -n togglemaster -l app=donation-service -o jsonpath='{.items[*].metadata.name}'); do
              echo "----- LOGS: $pod -----"
              kubectl logs "$pod" -n togglemaster --all-containers=true || true
            done
            exit 1
          }
