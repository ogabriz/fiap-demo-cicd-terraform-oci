name: "Donation Service - Build & Deploy"

on:
  push:
    branches: [ main ]
    paths:
      - "donation-service/**"
  pull_request:
    branches: [ main ]
    paths:
      - "donation-service/**"
  workflow_dispatch:

env:
  SERVICE_NAME: donation-service
  OCI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  lint-and-test:
    name: "Lint & Unit Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: donation-service/go.mod

      - name: Go Mod Tidy
        run: |
          cd donation-service
          go mod tidy

      - name: Go Lint
        run: |
          cd donation-service
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: Unit Test
        run: |
          cd donation-service
          go test -v ./...

  security-scan:
    name: "Security Scan (SAST & SCA)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gosec (SAST)
        uses: securego/gosec@master
        with:
          args: ./donation-service/...

      - name: Run Trivy (SCA - Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./donation-service"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: [ lint-and-test, security-scan ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login ${{ env.OCI_REGION }}.ocir.io -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USERNAME }}" --password-stdin

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./donation-service
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:latest

  deploy:
    name: "Deploy to OKE"
    runs-on: ubuntu-latest
    needs: [ build-and-push ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCI CLI
        uses: oracle-actions/setup-oci-cli@v1
        with:
          user: ${{ secrets.OCI_USER_OCID }}
          tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          region: ${{ env.OCI_REGION }}
          private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Get Kubeconfig
        run: |
          oci ce cluster create-kubeconfig --cluster-id ${{ secrets.OCI_OKE_CLUSTER_ID }} --file $HOME/.kube/config --region ${{ env.OCI_REGION }} --token-version 2.0.0 

      - name: Deploy to K8s
        run: |
          kubectl apply -f donation-service/k8s/manifests.yaml
          kubectl set image deployment/donation-service donation-service=${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:${{ github.sha }} -n togglemaster
          kubectl rollout status deployment/donation-service -n togglemaster
