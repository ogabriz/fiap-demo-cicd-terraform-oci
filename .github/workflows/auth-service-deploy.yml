name: "Auth Service - Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - "auth-service/**"
  workflow_dispatch:

env:
  SERVICE_NAME: auth-service
  OCI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure OCI Credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem

          EOF

          sed -i 's/^[[:space:]]*//' ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | bash -s -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Get OCI namespace
        id: oci-ns
        run: |
          NAMESPACE=$($HOME/bin/oci os ns get --query 'data' --raw-output)
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Validate OCIR secrets
        run: |
          if [ -z "${{ secrets.OCI_AUTH_TOKEN }}" ]; then
            echo "::error::OCI_AUTH_TOKEN secret is not configured. Go to OCI Console -> User Settings -> Auth Tokens -> Generate Token, then add it as a GitHub Secret."
            exit 1
          fi
          if [ -z "${{ secrets.OCI_USERNAME }}" ]; then
            echo "::error::OCI_USERNAME secret is not configured. Add your OCI username (email) as a GitHub Secret."
            exit 1
          fi

      - name: Login to OCIR
        run: |
          NAMESPACE=${{ steps.oci-ns.outputs.namespace }}
          echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login ${{ env.OCI_REGION }}.ocir.io -u "$NAMESPACE/${{ secrets.OCI_USERNAME }}" --password-stdin

      - name: Build and Push Docker image (ARM64)
        run: |
          NAMESPACE=${{ steps.oci-ns.outputs.namespace }}
          IMAGE="${{ env.OCI_REGION }}.ocir.io/${NAMESPACE}/togglemaster/${{ env.SERVICE_NAME }}"
          TAG="${{ github.sha }}"

          docker buildx build \
            --platform linux/arm64 \
            -t ${IMAGE}:${TAG} \
            -t ${IMAGE}:latest \
            --push \
            ./auth-service

      - name: Summary
        run: |
          NAMESPACE=${{ steps.oci-ns.outputs.namespace }}
          echo "### Docker Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.OCI_REGION }}.ocir.io/${NAMESPACE}/togglemaster/${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: "Deploy to OKE"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure OCI Credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem

          EOF

          sed -i 's/^[[:space:]]*//' ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | bash -s -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Test OCI CLI
        run: |
          oci os ns get --region ${{ env.OCI_REGION }}

      - name: Get OKE Cluster kubeconfig
        run: |
          CLUSTER_ID=$(oci ce cluster list \
            --compartment-id ${{ secrets.OCI_COMPARTMENT_ID }} \
            --region ${{ env.OCI_REGION }} \
            --lifecycle-state ACTIVE \
            --query "data[?name=='togglemaster-oke'].id | [0]" \
            --raw-output)

          echo "Cluster ID: $CLUSTER_ID"

          mkdir -p $HOME/.kube

          oci ce cluster create-kubeconfig \
            --cluster-id $CLUSTER_ID \
            --file $HOME/.kube/config \
            --region ${{ env.OCI_REGION }} \
            --token-version 2.0.0

      - name: Get OCI Namespace
        id: oci-ns
        run: |
          NAMESPACE=$($HOME/bin/oci os ns get --query 'data' --raw-output)
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Update deployment image tag
        run: |
          NAMESPACE=${{ steps.oci-ns.outputs.namespace }}
          IMAGE="${{ env.OCI_REGION }}.ocir.io/${NAMESPACE}/togglemaster/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          sed -i "s|REGION.ocir.io/NAMESPACE/togglemaster/auth-service:latest|${IMAGE}|g" auth-service/k8s/deployment.yaml

      - name: Create OCIR Pull Secret
        run: |
          NAMESPACE=${{ steps.oci-ns.outputs.namespace }}
          kubectl create namespace togglemaster --dry-run=client -o yaml | kubectl apply --validate=false -f -
          kubectl create secret docker-registry ocir-secret \
            --namespace=togglemaster \
            --docker-server=${{ env.OCI_REGION }}.ocir.io \
            --docker-username="$NAMESPACE/${{ secrets.OCI_USERNAME }}" \
            --docker-password="${{ secrets.OCI_AUTH_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Deploy to OKE
        run: |
          kubectl apply --validate=false -f auth-service/k8s/namespace.yaml
          kubectl apply --validate=false -f auth-service/k8s/secret.yaml
          kubectl delete job auth-db-init -n togglemaster --ignore-not-found
          kubectl apply --validate=false -f auth-service/k8s/db-init-job.yaml
          kubectl apply --validate=false -f auth-service/k8s/deployment.yaml
          kubectl apply --validate=false -f auth-service/k8s/service.yaml

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/auth-service -n togglemaster --timeout=120s

      - name: Get Service URL
        run: |
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "Waiting for LoadBalancer IP..." >> $GITHUB_STEP_SUMMARY
          kubectl get svc auth-service -n togglemaster -o wide
