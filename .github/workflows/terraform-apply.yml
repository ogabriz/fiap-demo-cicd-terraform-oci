name: 'Terraform Apply'

on:
  workflow_dispatch:

env:
  TF_VERSION: 'latest'
  WORKING_DIR: './terraform'

jobs:
  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure OCI Credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" | base64 -d > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem

          EOF
          
          sed -i 's/^[[:space:]]*//' ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | bash -s -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Import Existing OCIR Repos
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
        run: |
          declare -A REPO_MAP=(
            ["hackathon-repo/ngo-service"]="module.ocir.oci_artifacts_container_repository.ngo_service"
            ["hackathon-repo/donation-service"]="module.ocir.oci_artifacts_container_repository.donation_service"
            ["hackathon-repo/volunteer-service"]="module.ocir.oci_artifacts_container_repository.volunteer_service"
          )
          for repo_name in "${!REPO_MAP[@]}"; do
            resource="${REPO_MAP[$repo_name]}"
            # Skip if already in state
            if terraform state show "$resource" &>/dev/null; then
              echo "✓ $resource already in state"
              continue
            fi
            REPO_OCID=$(~/bin/oci artifacts container repository list \
              --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
              --all \
              --query "data.items[?\"display-name\"=='${repo_name}'].id | [0]" \
              --raw-output 2>/dev/null || true)
            if [ -n "$REPO_OCID" ] && [ "$REPO_OCID" != "null" ] && [ "$REPO_OCID" != "None" ]; then
              echo "Importing $resource ($REPO_OCID)..."
              terraform import -var-file=envs/dev.tfvars "$resource" "$REPO_OCID" || true
            else
              echo "⊘ $repo_name not found in OCI, will be created"
            fi
          done

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
        run: terraform plan -var-file=envs/dev.tfvars -out=tfplan


      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output -json > outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v5
        with:
          name: terraform-outputs
          path: terraform/outputs.json

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Terraform Apply completed successfully!"
          echo "📊 Check outputs artifact for resource details"
