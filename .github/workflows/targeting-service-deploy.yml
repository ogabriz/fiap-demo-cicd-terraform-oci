name: "Targeting Service - Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - "targeting-service/**"
  pull_request:
    branches: [main]
    paths:
      - "targeting-service/**"
  workflow_dispatch:

env:
  SERVICE_NAME: targeting-service
  OCI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  lint-and-test:
    name: "Lint & Unit Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd targeting-service
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Python Lint
        run: |
          cd targeting-service
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Unit Test
        run: |
          cd targeting-service
          pytest

  security-scan:
    name: "Security Scan (SAST & SCA)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r targeting-service/

      - name: Run Trivy (SCA - Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './targeting-service'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login ${{ env.OCI_REGION }}.ocir.io -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USERNAME }}" --password-stdin

      - name: Build and Scan Image
        uses: docker/build-push-action@v5
        with:
          context: ./targeting-service
          platforms: linux/arm64
          push: false
          tags: ${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:${{ github.sha }}
          load: true

      - name: Run Trivy (Container Scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push Image
        run: |
          IMAGE="${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}"
          TAG="${{ github.sha }}"
          docker push ${IMAGE}:${TAG}
          docker tag ${IMAGE}:${TAG} ${IMAGE}:latest
          docker push ${IMAGE}:latest

  update-gitops:
    name: "Update GitOps Repo"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update Image Tag
        run: |
          IMAGE="${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          sed -i "s|image:.*${{ env.SERVICE_NAME }}:.*|image: ${IMAGE}|g" targeting-service/k8s/deployment.yaml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add targeting-service/k8s/deployment.yaml
          git commit -m "chore(gitops): update ${{ env.SERVICE_NAME }} image to ${{ github.sha }}"
          git push origin main
