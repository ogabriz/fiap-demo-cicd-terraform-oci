name: "Volunteer Service - Build & Deploy"

on:
  push:
    branches: [ main ]
    paths:
      - "volunteer-service/**"
  pull_request:
    branches: [ main ]
    paths:
      - "volunteer-service/**"
  workflow_dispatch:

env:
  SERVICE_NAME: volunteer-service
  OCI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  lint-and-test:
    name: "Lint & Unit Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd volunteer-service
          pip install -r requirements.txt
          pip install flake8

      - name: Python Lint
        run: |
          cd volunteer-service
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  security-scan:
    name: "Security Scan (SAST & SCA)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r volunteer-service/

      - name: Run Trivy (SCA - Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./volunteer-service"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: [ lint-and-test, security-scan ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login ${{ env.OCI_REGION }}.ocir.io -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USERNAME }}" --password-stdin

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./volunteer-service
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:latest

  deploy:
    name: "Deploy to OKE"
    runs-on: ubuntu-latest
    needs: [ build-and-push ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCI CLI
        uses: oracle-actions/setup-oci-cli@v1
        with:
          user: ${{ secrets.OCI_USER_OCID }}
          tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          region: ${{ env.OCI_REGION }}
          private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Get Kubeconfig
        run: |
          oci ce cluster create-kubeconfig --cluster-id ${{ secrets.OCI_OKE_CLUSTER_ID }} --file $HOME/.kube/config --region ${{ env.OCI_REGION }} --token-version 2.0.0 

      - name: Deploy Infrastructure (PostgreSQL + Redis)
        run: |
          kubectl apply -f k8s-infra/postgres.yaml
          kubectl apply -f k8s-infra/redis.yaml
          kubectl rollout status deployment/postgres -n togglemaster --timeout=120s || true
          kubectl rollout status deployment/redis -n togglemaster --timeout=120s || true

      - name: Deploy to K8s
        run: |
          kubectl apply -f k8s-common/ingress.yaml
          kubectl apply -f volunteer-service/k8s/manifests.yaml
          kubectl set image deployment/volunteer-service volunteer-service=${{ env.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/togglemaster/${{ env.SERVICE_NAME }}:${{ github.sha }} -n togglemaster
          kubectl rollout status deployment/volunteer-service -n togglemaster
