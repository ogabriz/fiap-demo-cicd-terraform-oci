apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngo-service
  namespace: togglemaster
  labels:
    app: ngo-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ngo-service
  template:
    metadata:
      labels:
        app: ngo-service
    spec:
      imagePullSecrets:
      - name: ocir-secret
      initContainers:
      - name: wait-for-postgres
        image: docker.io/library/busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres.togglemaster.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done']
      containers:
      - name: ngo-service
        image: sa-saopaulo-1.ocir.io/grqkmwwimskh/hackathon-repo/ngo-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: PORT
          value: "8081"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ngo-service-secret
              key: DATABASE_URL
        - name: OTEL_SERVICE_NAME
          value: "ngo-service"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "https://otlp.nr-data.net"
        - name: NEW_RELIC_LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: newrelic-secret
              key: license-key
              optional: true
        - name: OTEL_EXPORTER_OTLP_HEADERS
          valueFrom:
            secretKeyRef:
              name: newrelic-secret
              key: otlp-headers
              optional: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ngo-service
  namespace: togglemaster
spec:
  selector:
    app: ngo-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8081
---
apiVersion: v1
kind: Secret
metadata:
  name: ngo-service-secret
  namespace: togglemaster
type: Opaque
stringData:
  DATABASE_URL: "postgres://togglemaster_user:togglepass123@postgres.togglemaster.svc.cluster.local:5432/ngo_db"
