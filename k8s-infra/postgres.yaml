apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: togglemaster
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres <<-EOSQL
      SELECT 'CREATE DATABASE ngo_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'ngo_db')\gexec
      SELECT 'CREATE DATABASE donation_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'donation_db')\gexec
      GRANT ALL PRIVILEGES ON DATABASE ngo_db TO $POSTGRES_USER;
      GRANT ALL PRIVILEGES ON DATABASE donation_db TO $POSTGRES_USER;
    EOSQL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: togglemaster
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    # Volume ReadWriteOnce so suporta 1 pod escrevendo por vez; Recreate
    # evita o K8s tentar subir um pod novo antes de derrubar o antigo
    # (o que travaria esperando o volume).
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: docker.io/library/postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "ngo_db"
        - name: POSTGRES_USER
          value: "togglemaster_user"
        - name: POSTGRES_PASSWORD
          value: "togglepass123"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "togglemaster_user"]
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "togglemaster_user"]
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-scripts
        configMap:
          name: postgres-init-script
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: togglemaster
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
