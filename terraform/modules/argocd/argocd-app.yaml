apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: togglemaster-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ealvesjr90/fiap-demo-cicd-terraform-oci
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: togglemaster

  syncPolicy:
    automated:
      prune: true
      selfHeal: true