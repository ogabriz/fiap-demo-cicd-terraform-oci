apiVersion: apps/v1
kind: Deployment
metadata:
  name: volunteer-service
  namespace: togglemaster
  labels:
    app: volunteer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: volunteer-service
  template:
    metadata:
      labels:
        app: volunteer-service
    spec:
      imagePullSecrets:
      - name: ocir-secret
      containers:
      - name: volunteer-service
        image: sa-saopaulo-1.ocir.io/grqkmwwimskh/hackathon-repo/volunteer-service:latest
        ports:
        - containerPort: 8083
        env:
        - name: PORT
          value: "8083"
        - name: OCI_REGION
          value: "sa-saopaulo-1"
        - name: OCI_NOSQL_COMPARTMENT_ID
          valueFrom:
            secretKeyRef:
              name: volunteer-service-secret
              key: OCI_NOSQL_COMPARTMENT_ID
        - name: OCI_NOSQL_TABLE_NAME
          value: "togglemaster_table"
        # OpenTelemetry / New Relic
        - name: OTEL_SERVICE_NAME
          value: "volunteer-service"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "https://otlp.nr-data.net"
        - name: NEW_RELIC_LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: newrelic-secret
              key: license-key
        - name: OTEL_EXPORTER_OTLP_HEADERS
          value: "api-key=$(NEW_RELIC_LICENSE_KEY)"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: volunteer-service
  namespace: togglemaster
spec:
  selector:
    app: volunteer-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8083
---
apiVersion: v1
kind: Secret
metadata:
  name: volunteer-service-secret
  namespace: togglemaster
type: Opaque
stringData:
  OCI_NOSQL_COMPARTMENT_ID: "SUBSTITUIR_PELO_COMPARTMENT_OCID"
