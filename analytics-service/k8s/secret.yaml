# ATENÇÃO: Este arquivo é apenas um template de referência.
# Os valores reais são injetados pelo workflow via GitHub Secrets.
# NÃO aplique este arquivo manualmente com valores reais.
#
# GitHub Secrets necessários:
#   OCI_QUEUE_ENDPOINT  - ex: https://cell-1.queue.messaging.sa-saopaulo-1.oci.oraclecloud.com
#   OCI_QUEUE_ID        - OCID da fila OCI Queue
#   OCI_NOSQL_TABLE     - nome da tabela NoSQL (ex: ToggleMasterAnalytics)
#   OCI_COMPARTMENT_ID  - OCID do compartment
apiVersion: v1
kind: Secret
metadata:
  name: analytics-service-secret
  namespace: togglemaster
  labels:
    app: analytics-service
type: Opaque
stringData:
  OCI_QUEUE_ENDPOINT: "CHANGE_ME"
  OCI_QUEUE_ID: "CHANGE_ME"
  OCI_NOSQL_TABLE: "ToggleMasterAnalytics"
  OCI_COMPARTMENT_ID: "CHANGE_ME"
