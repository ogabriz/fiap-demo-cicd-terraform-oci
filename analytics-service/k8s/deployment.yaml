apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: togglemaster
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      # 1. Pod-level security context
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: analytics-service
          image: sa-saopaulo-1.ocir.io/grqkmwwimskh/togglemaster/analytics-service:3c1b212b5124637b78654def26deb58a3fbafae4
          # 2. Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8005
              protocol: TCP
          env:
            - name: PORT
              value: "8005"
            - name: OTEL_SERVICE_NAME
              value: "analytics-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://otlp.nr-data.net"
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-secret
                  key: license-key
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: "api-key=$(NEW_RELIC_LICENSE_KEY)"
            - name: OCI_QUEUE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: OCI_QUEUE_ENDPOINT
            - name: OCI_QUEUE_ID
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: OCI_QUEUE_ID
            - name: OCI_NOSQL_TABLE
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: OCI_NOSQL_TABLE
            - name: OCI_COMPARTMENT_ID
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: OCI_COMPARTMENT_ID
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always
