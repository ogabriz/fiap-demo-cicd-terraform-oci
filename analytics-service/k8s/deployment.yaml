apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: togglemaster
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: analytics-service
          image: REGION.ocir.io/NAMESPACE/togglemaster/analytics-service:latest
          ports:
            - containerPort: 8005
              protocol: TCP
          env:
            - name: PORT
              value: "8005"
            - name: AWS_SQS_URL
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_SQS_URL
            - name: AWS_DYNAMODB_TABLE
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_DYNAMODB_TABLE
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_REGION
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always
